services:
  neo4j:
    image: neo4j:5.15.0
    container_name: echelon-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/echelon_secret
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [ "CMD", "neo4j", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: echelon-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=echelon
      - POSTGRES_PASSWORD=echelon_secret
      - POSTGRES_DB=echelon_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U echelon" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echelon-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=echelon_secret
      - POSTGRES_URL=postgresql://echelon:echelon_secret@postgres:5432/echelon_db
      - PYTHONUNBUFFERED=1
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - model_data:/app/saved_models

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: echelon-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  model_data:
